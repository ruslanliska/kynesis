services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: kynesis-api:dev
    container_name: kynesis-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./main.py:/app/main.py
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    restart: unless-stopped
